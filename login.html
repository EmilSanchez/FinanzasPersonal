<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="img/favicon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Finanzas PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #0f1923;
  --muted:  #6b7a8d;
  --light:  #d1d8e0;
  --bg:     #f0eee9;
  --white:  #ffffff;
  --navy:   #1a3a5c;
  --gold:   #c9a84c;
}

html, body {
  height: 100%; width: 100%;
  font-family: 'DM Sans', sans-serif;
  background: #0d1117;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
}

/* ── Full screen layout ── */
.app {
  height: 100dvh;
  width: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top hero ── */
.hero {
  background: var(--navy);
  padding: 32px 32px 28px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.hero::before {
  content: '';
  position: absolute;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: rgba(255,255,255,.04);
  top: -100px; right: -60px;
}
.hero::after {
  content: '';
  position: absolute;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(201,168,76,.07);
  bottom: -40px; left: -30px;
}
.hero-brand {
  display: flex; align-items: center; gap: 0;
  position: relative; z-index: 1;
}
.hero h1 {
  font-family: 'Calibri', 'Carlito', 'Trebuchet MS', sans-serif;
  font-size: 1.7rem;
  color: #fff;
  line-height: 1;
  white-space: nowrap;
}
.hero h1 span { color: var(--gold); }
.hero-desc { display: none; }
.hero-foot { display: none; }

/* ── Body panel ── */
.body {
  flex: 1;
  background: var(--white);
  border-radius: 0;
  padding: 40px 28px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── Screens ── */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; animation: screenIn .28s cubic-bezier(.22,.68,0,1.15) both; }
.screen.exit    { animation: screenOut .22s ease-in forwards; }
@keyframes screenIn  { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
@keyframes screenOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-12px); } }
/* Avatar con foto */
.avatar-wrap { position:relative; width:42px; height:42px; flex-shrink:0; }
.avatar { width:42px; height:42px; border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.95rem; overflow:hidden; }
.avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

/* User list */
.section-label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}
.user-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; flex: 1; }

.user-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  border: 1.5px solid var(--light);
  border-radius: 14px;
  cursor: pointer;
  background: var(--white);
  font-family: inherit;
  width: 100%; text-align: left;
  transition: border-color .18s, background .18s, box-shadow .18s, transform .18s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color: transparent;
}
.user-item:hover {
  border-color: var(--navy);
  background: #f0f4f9;
  transform: translateX(4px);
  box-shadow: -3px 0 0 0 var(--navy);
}
.user-item:active { transform: scale(.97) translateX(2px); }
.user-item.selected {
  border-color: var(--navy);
  background: #f0f4f9;
  box-shadow: -3px 0 0 0 var(--navy), 0 0 0 3px rgba(26,58,92,.07);
  transform: translateX(4px);
}
.avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .95rem; color: #fff; flex-shrink: 0;
}
.user-info-name { font-size: .9rem; font-weight: 600; color: var(--ink); }
.user-info-role { font-size: .72rem; color: var(--muted); margin-top: 2px; }
.check { display: none; } /* removed */

.btn-main {
  width: 100%; padding: 16px;
  background: var(--navy); color: #fff;
  border: none; border-radius: 14px;
  font-size: .95rem; font-weight: 600; font-family: inherit;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .15s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.btn-main:active { background: #0f2540; transform: scale(.98); }
.btn-main:disabled { opacity: .35; pointer-events: none; }

/* ── PIN screen ── */
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  font-size: .8rem; color: var(--muted); font-family: inherit;
  padding: 0; margin-bottom: 24px;
}
.pin-who {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}
.pin-av { width: 52px; height: 52px; border-radius: 50%; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.1rem; flex-shrink:0; overflow:hidden; border:2px solid rgba(0,0,0,.08); }
.pin-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.pin-nm { font-size: 1rem; font-weight: 700; color: var(--ink); }
.pin-ht { font-size: .75rem; color: var(--muted); margin-top: 2px; }

.dots { display: flex; gap: 12px; margin-bottom: 28px; justify-content: center; }
.dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid var(--light); transition: all .18s; }
.dot.on { background: var(--navy); border-color: var(--navy); transform: scale(1.2); }

.pad {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
  margin-bottom: 14px; flex: 1; align-content: start;
}
.num {
  padding: 0; height: 64px;
  border: 1.5px solid var(--light);
  border-radius: 14px;
  background: var(--white);
  font-size: 1.2rem; font-weight: 500; color: var(--ink);
  font-family: inherit; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
  -webkit-tap-highlight-color: transparent;
}
.num:active { background: #f0f4f9; transform: scale(.94); }
.num.del { font-size: .9rem; color: var(--muted); }
.num.ok { background: var(--navy); border-color: var(--navy); color: #fff; }
.num.ok:active { background: #0f2540; }

.pin-err { font-size: .8rem; color: #dc2626; min-height: 18px; text-align: center; }
.verifying { display:none; flex-direction:column; align-items:center; gap:10px; padding:16px 0; }
.spin { width:28px;height:28px;border:2.5px solid rgba(26,58,92,.15);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Loading screen */
#loading {
  position: fixed; inset: 0;
  background: #0d1117;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  z-index: 999;
}
#loading .spin { width:36px;height:36px;border-top-color:#fff;border-color:rgba(255,255,255,.2); }
#loading p { font-size:.85rem;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif; }

/* Desktop — card centrado sin panel azul */
@media (min-width: 700px) {
  html, body {
    overflow: auto; height: auto; min-height: 100%;
    background: #0d1117;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(26,58,92,.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,.06) 0%, transparent 50%);
    display: flex; align-items: center; justify-content: center;
  }
  .app {
    height: auto;
    width: 420px; max-width: 95vw;
    flex-direction: column;
    border-radius: 24px;
    box-shadow: 0 40px 100px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.07);
    overflow: hidden;
  }
  .hero { display: none; }
  .body {
    border-radius: 24px;
    padding: 44px 40px;
    display: flex; flex-direction: column; justify-content: center;
    background: #f8f7f5;
  }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <p>Conectando…</p>
</div>

<div class="app" id="app" style="display:none;">

  <!-- Body -->
  <div class="body">

    <!-- Pantalla: selección -->
    <div class="screen active" id="screen-users">
      <div style="text-align:center;margin-bottom:28px;">
        <h1 style="font-family:'Calibri','Carlito','Trebuchet MS',sans-serif;font-size:1.8rem;font-weight:700;color:var(--ink);line-height:1;">Finanzas <span style="color:var(--gold);">PRO</span></h1>
        <p style="font-size:.8rem;color:var(--muted);margin-top:6px;">Selecciona tu perfil para continuar</p>
      </div>
      <div class="user-list" id="user-list"></div>

    </div>

    <!-- Pantalla: PIN -->
    <div class="screen" id="screen-pin">
      <button class="back-link" onclick="volverUsuarios()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Cambiar perfil
      </button>
      <div class="pin-who">
        <div class="pin-av" id="pin-av"></div>
        <div>
          <div class="pin-nm" id="pin-nm"></div>
          <div class="pin-ht">Ingresa tu PIN de acceso</div>
        </div>
      </div>
      <div class="dots">
        <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
      </div>
      <div class="verifying" id="verifying"><div class="spin"></div><span style="font-size:.8rem;color:var(--muted);">Verificando…</span></div>
      <div class="pad" id="pad">
        <button class="num" onclick="pp('1')">1</button><button class="num" onclick="pp('2')">2</button><button class="num" onclick="pp('3')">3</button>
        <button class="num" onclick="pp('4')">4</button><button class="num" onclick="pp('5')">5</button><button class="num" onclick="pp('6')">6</button>
        <button class="num" onclick="pp('7')">7</button><button class="num" onclick="pp('8')">8</button><button class="num" onclick="pp('9')">9</button>
        <button class="num del" onclick="pd()">⌫</button><button class="num" onclick="pp('0')">0</button><button class="num ok" onclick="psubmit()">✓</button>
      </div>
      <div class="pin-err" id="pin-err"></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDocs, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const CFG={apiKey:"AIzaSyCMsgSK8tJW4-7OHkB-ZTcjGSOenmPRIog",authDomain:"finanzas-pro-1db2d.firebaseapp.com",projectId:"finanzas-pro-1db2d",storageBucket:"finanzas-pro-1db2d.firebasestorage.app",messagingSenderId:"74142920533",appId:"1:74142920533:web:6aa4b1a9ae82a94125c9dc"};
const app=initializeApp(CFG),db=getFirestore(app),auth=getAuth(app);

async function sha256(t){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

const SK='fp_session',SM=30*60*1000;
try{const r=localStorage.getItem(SK);if(r){const s=JSON.parse(r);if(Date.now()-s.ts<SM){window.location.replace('index.html');}}}catch(e){}

let usuarios=[],selected=null,buf='';
const COLORS=['#1a3a5c','#6b46c1','#065f46','#92400e','#991b1b','#0e7490'];

try{await signInAnonymously(auth);}catch(e){console.warn(e.message);}
try{const s=await getDocs(collection(db,'usuarios'));usuarios=s.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.activo!==false);}catch(e){}

// Cargar perfil del admin desde Firebase
let adminPerfilNombre = 'Administrador', adminPerfilFoto = '';
try {
  const cfgSnap = await getDoc(doc(db,'config','app'));
  if (cfgSnap.exists()) {
    const d = cfgSnap.data();
    if (d.perfilNombre) adminPerfilNombre = d.perfilNombre;
    if (d.perfilFoto)   adminPerfilFoto   = d.perfilFoto;
  }
} catch(e) { console.warn('Perfil load error:', e); }

// Cargar perfiles de usuarios desde sus documentos
const usuariosConPerfil = await Promise.all(usuarios.map(async u => {
  try {
    const snap = await getDoc(doc(db,'usuarios',u.id));
    if (snap.exists()) {
      const d = snap.data();
      return { ...u, perfilNombre: d.perfilNombre || '', perfilFoto: d.perfilFoto || '' };
    }
  } catch(e) {}
  return { ...u, perfilNombre: '', perfilFoto: '' };
}));
usuarios = usuariosConPerfil;

function getAdminFoto(){ return adminPerfilFoto; }
function getAdminNombre(){ return adminPerfilNombre; }

function avatarHTML(color, name, foto){
  if(foto) return `<img src="${foto}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  return `<span style="font-size:.95rem;font-weight:700;">${name[0].toUpperCase()}</span>`;
}

function renderUsers(){
  const list=document.getElementById('user-list');
  list.innerHTML='';
  const adminNombre = getAdminNombre();
  const adminFoto   = getAdminFoto();
  const items=[
    {user:null, name:adminNombre, role:'Administrador', color:'#1a3a5c', foto:adminFoto},
    ...usuarios.map((u,i)=>({user:u, name:u.perfilNombre||u.nombre, role:'Usuario', color:COLORS[(i+1)%COLORS.length], foto:u.perfilFoto||''}))
  ];
  items.forEach(({user,name,role,color,foto})=>{
    const btn=document.createElement('button');
    btn.className='user-item';
    btn.innerHTML=`
      <div class="avatar" style="background:${color};display:flex;align-items:center;justify-content:center;">
        ${avatarHTML(color,name,foto)}
      </div>
      <div>
        <div class="user-info-name">${name}</div>
        <div class="user-info-role">${role}</div>
      </div>
      <div class="check">
        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>`;
    btn.onclick=()=>{
      document.querySelectorAll('.user-item').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selected={user,name,color,foto};
      setTimeout(irAPin, 120); // pequeña pausa para ver el borde activo antes de transición
    };
    list.appendChild(btn);
  });
}

function transitionScreens(from, to, cb){
  const fromEl=document.getElementById(from);
  const toEl  =document.getElementById(to);
  fromEl.classList.add('exit');
  setTimeout(()=>{
    fromEl.classList.remove('active','exit');
    toEl.classList.add('active');
    if(cb) cb();
  }, 200);
}

window.irAPin=function(){
  const name  = selected ? selected.name  : getAdminNombre();
  const color = selected ? selected.color : '#1a3a5c';
  const foto  = selected ? selected.foto  : getAdminFoto();

  // Avatar con foto o inicial
  const avEl = document.getElementById('pin-av');
  avEl.style.background = foto ? 'transparent' : color;
  avEl.innerHTML = foto
    ? `<img src="${foto}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
    : name[0].toUpperCase();
  document.getElementById('pin-nm').textContent = name;
  buf=''; updateDots();
  transitionScreens('screen-users','screen-pin');
};

window.volverUsuarios=function(){
  buf=''; document.getElementById('pin-err').textContent='';
  transitionScreens('screen-pin','screen-users');
};

window.pp=function(d){if(buf.length>=4)return;buf+=d;updateDots();if(buf.length===4)setTimeout(psubmit,180);};
window.pd=function(){buf=buf.slice(0,-1);updateDots();};
function updateDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('on',i<buf.length);}

window.psubmit=async function(){
  const entered=buf;buf='';updateDots();
  document.getElementById('verifying').style.display='flex';
  document.getElementById('pad').style.display='none';
  const eh=await sha256(entered);
  // selected = {user, name, color, foto} — user es null para admin
  const selUser = selected ? selected.user : null;
  let ch;
  if(!selUser){
    // Admin
    const leg=localStorage.getItem('fp_pin');
    if(leg){localStorage.setItem('fp_pin_hash',await sha256(leg));localStorage.removeItem('fp_pin');}
    if(!localStorage.getItem('fp_pin_hash'))localStorage.setItem('fp_pin_hash',await sha256('1234'));
    try{const s=await getDoc(doc(db,'config','app'));const r=s.exists()?s.data().pin:null;if(r&&r.length===64)localStorage.setItem('fp_pin_hash',r);}catch(e){}
    ch=localStorage.getItem('fp_pin_hash');
  } else { ch=selUser.pinHash; }
  if(eh===ch){
    if(selUser&&selUser.activo===false){
      document.getElementById('verifying').style.display='none';
      document.getElementById('pad').style.display='grid';
      const err=document.getElementById('pin-err');
      err.textContent='Cuenta desactivada. Contacta al administrador.';
      setTimeout(()=>{err.textContent='';},4000);
      return;
    }
    const su=selUser?{id:selUser.id,nombre:selUser.nombre,isAdmin:false}:{isAdmin:true};
    localStorage.setItem(SK,JSON.stringify({ts:Date.now(),user:su}));
    window.location.replace('index.html');
  } else {
    document.getElementById('verifying').style.display='none';
    document.getElementById('pad').style.display='grid';
    const err=document.getElementById('pin-err');
    err.textContent='PIN incorrecto. Intenta de nuevo.';
    setTimeout(()=>{err.textContent='';},2500);
  }
};

document.addEventListener('keydown',e=>{
  if(!document.getElementById('screen-pin').classList.contains('active'))return;
  if(e.key==='Enter')psubmit();
  else if(e.key==='Backspace')pd();
  else if(/^[0-9]$/.test(e.key))pp(e.key);
});

renderUsers();
document.getElementById('loading').style.display='none';
document.getElementById('app').style.display='flex';
</script>
</body>
</html>
